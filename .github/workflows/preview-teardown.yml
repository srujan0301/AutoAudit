name: Preview Teardown

on:
  pull_request:
    types: [closed, labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to tear down (for manual testing)"
        required: true
        default: "1"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  teardown:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' && github.event.action == 'closed') ||
      (github.event_name == 'pull_request' && github.event.action == 'labeled' &&
       github.event.label.name == 'teardown-preview')

    steps:
      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove teardown-preview label
        if: github.event_name == 'pull_request' && github.event.action == 'labeled'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'teardown-preview'
            });

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.PREVIEW_GCP_CREDENTIALS }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete Cloud Run service
        env:
          GCP_PROJECT_ID: ${{ secrets.PREVIEW_GCP_PROJECT_ID }}
        run: |
          gcloud run services delete "autoaudit-pr-${{ steps.pr.outputs.number }}" \
            --region us-central1 \
            --project "$GCP_PROJECT_ID" \
            --quiet || true

      - name: Delete Neon branch
        env:
          NEON_API_KEY: ${{ secrets.PREVIEW_NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.PREVIEW_NEON_PROJECT_ID }}
        run: |
          BRANCH_NAME="pr-${{ steps.pr.outputs.number }}"

          BRANCH_ID=$(curl -s \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
          | jq -r --arg name "$BRANCH_NAME" '.branches[] | select(.name == $name) | .id')

          if [ -n "$BRANCH_ID" ] && [ "$BRANCH_ID" != "null" ]; then
            curl -s -X DELETE \
              -H "Authorization: Bearer ${NEON_API_KEY}" \
              "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches/${BRANCH_ID}"
            echo "Deleted Neon branch: ${BRANCH_ID} (${BRANCH_NAME})"
          else
            echo "No Neon branch found for ${BRANCH_NAME}, skipping"
          fi

      - name: Delete Netlify preview deploy
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.PREVIEW_NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.PREVIEW_NETLIFY_SITE_ID }}
        run: |
          BRANCH_NAME="pr-${{ steps.pr.outputs.number }}"

          DEPLOY_IDS=$(curl -s \
            -H "Authorization: Bearer ${NETLIFY_AUTH_TOKEN}" \
            "https://api.netlify.com/api/v1/sites/${NETLIFY_SITE_ID}/deploys?per_page=100" \
          | jq -r --arg branch "$BRANCH_NAME" '.[] | select(.branch == $branch) | .id')

          if [ -z "$DEPLOY_IDS" ]; then
            echo "No Netlify deploys found for branch ${BRANCH_NAME}, skipping"
          else
            for DEPLOY_ID in $DEPLOY_IDS; do
              curl -s -X DELETE \
                -H "Authorization: Bearer ${NETLIFY_AUTH_TOKEN}" \
                "https://api.netlify.com/api/v1/deploys/${DEPLOY_ID}"
              echo "Deleted Netlify deploy: ${DEPLOY_ID}"
            done
          fi

      - name: Find existing preview comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ steps.pr.outputs.number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- autoaudit-preview -->"

      - name: Update comment — teardown complete
        if: steps.find-comment.outputs.comment-id != ''
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ steps.pr.outputs.number }}
          edit-mode: replace
          body: |
            <!-- autoaudit-preview -->
            ## Preview Environment

            Preview environment for this PR has been **torn down**.

            > [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
