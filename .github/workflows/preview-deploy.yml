name: Preview Deploy

on:
  pull_request:
    types: [labeled]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to simulate (for manual testing)"
        required: true
        default: "1"

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 0 — Gate: validate trigger, resolve PR number, remove consumed label
  # Triggered by adding the "deploy-preview" label to the PR.
  # Using pull_request (not issue_comment) so the workflow runs from the PR
  # branch HEAD, not from main — allowing pre-merge testing.
  # ─────────────────────────────────────────────────────────────────────────────
  gate:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'pull_request' &&
       github.event.label.name == 'deploy-preview')
    outputs:
      pr-number: ${{ steps.pr.outputs.number }}
      short-sha: ${{ steps.sha.outputs.short }}

    steps:
      - name: Resolve PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "number=${{ github.event.number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ inputs.pr_number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve short SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "short=$(echo '${{ github.event.pull_request.head.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"
          else
            echo "short=$(echo '${{ github.sha }}' | cut -c1-7)" >> "$GITHUB_OUTPUT"
          fi

      - name: Remove deploy-preview label
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.removeLabel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              name: 'deploy-preview'
            });

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1 — Build & deploy frontend to Netlify
  # Runs after deploy-backend-preview so VITE_API_URL can be set to the real
  # Cloud Run URL (which isn't known until after the first backend deploy).
  # ─────────────────────────────────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    needs: [gate, deploy-backend-preview]
    outputs:
      netlify-url: ${{ steps.deploy.outputs.deploy-url }}
      pr-number: ${{ needs.gate.outputs.pr-number }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_API_URL: ${{ needs.deploy-backend-preview.outputs.backend-url }}
        run: npm run build

      - name: Deploy to Netlify
        id: deploy
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: frontend/dist
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "PR #${{ needs.gate.outputs.pr-number }} — preview deploy"
          alias: pr-${{ needs.gate.outputs.pr-number }}
          enable-pull-request-comment: false
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.PREVIEW_NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.PREVIEW_NETLIFY_SITE_ID }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2 — Build & push backend image to Docker Hub (parallel with job 1)
  # ─────────────────────────────────────────────────────────────────────────────
  build-push-backend-image:
    runs-on: ubuntu-latest
    needs: gate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.PREVIEW_DOCKER_HUB_USERNAME }}
          password: ${{ secrets.PREVIEW_DOCKER_HUB_TOKEN }}

      - name: Build & push backend image
        run: |
          PR_NUM=${{ needs.gate.outputs.pr-number }}
          SHA=${{ needs.gate.outputs.short-sha }}
          IMAGE="docker.io/${{ secrets.PREVIEW_DOCKER_HUB_USERNAME }}/autoaudit-backend:pr-${PR_NUM}-${SHA}"
          docker build \
            -f backend-api/Dockerfile \
            -t "$IMAGE" \
            .
          docker push "$IMAGE"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3 — Deploy backend to Cloud Run with Neon DB branch (needs job 2)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-backend-preview:
    runs-on: ubuntu-latest
    needs: [gate, build-push-backend-image]
    outputs:
      backend-url: ${{ steps.deploy.outputs.backend-url }}

    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.PREVIEW_GCP_CREDENTIALS }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Create or reuse Neon DB branch
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.PREVIEW_NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.PREVIEW_NEON_PROJECT_ID }}
        run: |
          BRANCH_NAME="pr-${{ needs.gate.outputs.pr-number }}"

          EXISTING=$(curl -s \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
          | jq -r --arg name "$BRANCH_NAME" '.branches[] | select(.name == $name) | .id')

          if [ -n "$EXISTING" ]; then
            echo "Reusing existing Neon branch: ${EXISTING}"
            BRANCH_ID="$EXISTING"
          else
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer ${NEON_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"branch\": {\"name\": \"${BRANCH_NAME}\"}, \"endpoints\": [{\"type\": \"read_write\"}]}" \
              "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches")
            BRANCH_ID=$(echo "$RESPONSE" | jq -r '.branch.id')
            echo "Created Neon branch: ${BRANCH_ID}"
          fi

          if [ -z "$BRANCH_ID" ] || [ "$BRANCH_ID" = "null" ]; then
            echo "ERROR: Failed to get or create Neon branch (BRANCH_ID=${BRANCH_ID})"
            exit 1
          fi

          # Ensure a read_write compute endpoint exists for the branch (may be missing on reused branches)
          ENDPOINT_ID=$(curl -s \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/endpoints" \
          | jq -r --arg bid "$BRANCH_ID" '.endpoints[] | select(.branch_id == $bid and .type == "read_write") | .id' | head -1)

          if [ -z "$ENDPOINT_ID" ] || [ "$ENDPOINT_ID" = "null" ]; then
            echo "No compute endpoint found for branch ${BRANCH_ID}, creating one..."
            EP_RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer ${NEON_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"endpoint\": {\"branch_id\": \"${BRANCH_ID}\", \"type\": \"read_write\"}}" \
              "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/endpoints")
            ENDPOINT_ID=$(echo "$EP_RESPONSE" | jq -r '.endpoint.id')
            if [ -z "$ENDPOINT_ID" ] || [ "$ENDPOINT_ID" = "null" ]; then
              echo "ERROR: Failed to create endpoint (response: ${EP_RESPONSE})"
              exit 1
            fi
            echo "Created endpoint: ${ENDPOINT_ID}"
          else
            echo "Found existing endpoint: ${ENDPOINT_ID}"
          fi

          # pooled=false → direct connection (no PgBouncer); asyncpg is incompatible with
          # Neon's pooler because it uses extended query protocol features PgBouncer blocks.
          CONN=$(curl -s \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/connection_uri?branch_id=${BRANCH_ID}&database_name=neondb&role_name=neondb_owner&pooled=false")
          DB_URL=$(echo "$CONN" | jq -r '.uri')

          if [ -z "$DB_URL" ] || [ "$DB_URL" = "null" ]; then
            echo "ERROR: Failed to get Neon connection URI (response: ${CONN})"
            exit 1
          fi

          # Strip all query params from the Neon URL (channel_binding and sslmode are libpq-only
          # and not handled by all SQLAlchemy 2.0.x asyncpg dialect versions).
          # Use ssl=require — SQLAlchemy's asyncpg dialect explicitly converts "require" → True
          # before passing to asyncpg.connect(), so asyncpg receives ssl=True (a valid value).
          BASE_URL="${DB_URL%%\?*}"
          ASYNCPG_URL="${BASE_URL/postgresql:\/\//postgresql+asyncpg:\/\/}?ssl=require"

          echo "database-url=${ASYNCPG_URL}" >> "$GITHUB_OUTPUT"

      - name: Deploy to Cloud Run
        id: deploy
        env:
          GCP_PROJECT_ID: ${{ secrets.PREVIEW_GCP_PROJECT_ID }}
          SECRET_KEY: ${{ secrets.PREVIEW_SECRET_KEY }}
          ENCRYPTION_KEY: ${{ secrets.PREVIEW_ENCRYPTION_KEY }}
          REDIS_URL: ${{ secrets.PREVIEW_UPSTASH_REDIS_URL }}
          DATABASE_URL: ${{ steps.neon.outputs.database-url }}
          FRONTEND_URL: "https://pr-${{ needs.gate.outputs.pr-number }}--${{ vars.NETLIFY_SITE_NAME }}.netlify.app"
        run: |
          SERVICE="autoaudit-pr-${{ needs.gate.outputs.pr-number }}"
          IMAGE="docker.io/${{ secrets.PREVIEW_DOCKER_HUB_USERNAME }}/autoaudit-backend:pr-${{ needs.gate.outputs.pr-number }}-${{ needs.gate.outputs.short-sha }}"
          REGION="us-central1"

          gcloud run deploy "$SERVICE" \
            --image "$IMAGE" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --port 8000 \
            --min-instances 0 \
            --max-instances 3 \
            --memory 512Mi \
            --cpu-boost \
            --set-env-vars "APP_ENV=preview,OPA_URL=http://localhost:8181,SECRET_KEY=${SECRET_KEY},ENCRYPTION_KEY=${ENCRYPTION_KEY},DATABASE_URL=${DATABASE_URL},REDIS_URL=${REDIS_URL},FRONTEND_URL=${FRONTEND_URL}" \
            --project "$GCP_PROJECT_ID"

          # Cloud Run URLs contain a project hash — discover after first deploy
          URL=$(gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --format 'value(status.url)' \
            --project "$GCP_PROJECT_ID")

          # Patch BACKEND_PUBLIC_URL now that the URL is known (used for OAuth redirects)
          gcloud run services update "$SERVICE" \
            --region "$REGION" \
            --update-env-vars "BACKEND_PUBLIC_URL=${URL}" \
            --project "$GCP_PROJECT_ID"

          echo "backend-url=${URL}" >> "$GITHUB_OUTPUT"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4 — Post / update PR comment with preview URLs
  # ─────────────────────────────────────────────────────────────────────────────
  post-preview-comment:
    runs-on: ubuntu-latest
    needs: [build-frontend, deploy-backend-preview]
    if: always() && needs.build-frontend.result == 'success'

    steps:
      - name: Find existing preview comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ needs.build-frontend.outputs.pr-number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- autoaudit-preview -->"

      - name: Create or update preview comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ needs.build-frontend.outputs.pr-number }}
          edit-mode: replace
          body: |
            <!-- autoaudit-preview -->
            ## Preview Environment

            | | URL | Status |
            |---|---|---|
            | Frontend | ${{ needs.build-frontend.outputs.netlify-url }} | ${{ needs.build-frontend.result }} |
            | Backend | ${{ needs.deploy-backend-preview.outputs.backend-url }} | ${{ needs.deploy-backend-preview.result }} |

            > Last updated: ${{ github.sha }} · [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
