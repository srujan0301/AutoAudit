name: Preview Deploy

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to simulate (for manual testing)"
        required: true
        default: "1"

permissions:
  contents: read
  pull-requests: write

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Job 1 — Build & deploy frontend to Netlify
  # ─────────────────────────────────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    outputs:
      netlify-url: ${{ steps.deploy.outputs.deploy-url }}
      pr-number: ${{ steps.pr.outputs.number }}

    steps:
      - name: Resolve PR number
        id: pr
        run: |
          echo "number=${{ github.event.number || inputs.pr_number }}" >> "$GITHUB_OUTPUT"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        env:
          # will be replaced when backend preview is added
          VITE_API_URL: http://localhost:8000
        run: npm run build

      - name: Deploy to Netlify
        id: deploy
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: frontend/dist
          production-deploy: false
          github-token: ${{ secrets.GITHUB_TOKEN }}
          deploy-message: "PR #${{ steps.pr.outputs.number }} — ${{ github.event.pull_request.title }}"
          alias: pr-${{ steps.pr.outputs.number }}
          enable-pull-request-comment: false
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.PREVIEW_NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.PREVIEW_NETLIFY_SITE_ID }}

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 2 — Build & push backend image to Docker Hub (parallel with job 1)
  # ─────────────────────────────────────────────────────────────────────────────
  build-push-backend-image:
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.meta.outputs.image-tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.PREVIEW_DOCKER_HUB_USERNAME }}
          password: ${{ secrets.PREVIEW_DOCKER_HUB_TOKEN }}

      - name: Set image tag
        id: meta
        run: |
          PR_NUM=${{ github.event.number || inputs.pr_number }}
          echo "image-tag=${{ secrets.PREVIEW_DOCKER_HUB_USERNAME }}/autoaudit-backend:pr-${PR_NUM}" >> "$GITHUB_OUTPUT"

      - name: Build & push backend image
        run: |
          docker build \
            -f backend-api/Dockerfile \
            -t "${{ steps.meta.outputs.image-tag }}" \
            .
          docker push "${{ steps.meta.outputs.image-tag }}"

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 3 — Deploy backend to Fly.io with Neon DB branch (needs job 2)
  # ─────────────────────────────────────────────────────────────────────────────
  deploy-backend-preview:
    runs-on: ubuntu-latest
    needs: build-push-backend-image
    outputs:
      backend-url: ${{ steps.urls.outputs.backend-url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve PR number
        id: pr
        run: |
          echo "number=${{ github.event.number || inputs.pr_number }}" >> "$GITHUB_OUTPUT"

      - name: Set URLs
        id: urls
        run: |
          echo "backend-url=https://autoaudit-pr-${{ steps.pr.outputs.number }}.fly.dev" >> "$GITHUB_OUTPUT"

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Create Fly app (idempotent)
        env:
          FLY_API_TOKEN: ${{ secrets.PREVIEW_FLY_API_TOKEN }}
        run: |
          flyctl apps create autoaudit-pr-${{ steps.pr.outputs.number }} --org personal || true

      - name: Create or reuse Neon DB branch
        id: neon
        env:
          NEON_API_KEY: ${{ secrets.PREVIEW_NEON_API_KEY }}
          NEON_PROJECT_ID: ${{ secrets.PREVIEW_NEON_PROJECT_ID }}
        run: |
          BRANCH_NAME="pr-${{ steps.pr.outputs.number }}"

          EXISTING=$(curl -s \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches" \
          | jq -r --arg name "$BRANCH_NAME" '.branches[] | select(.name == $name) | .id')

          if [ -n "$EXISTING" ]; then
            echo "Reusing existing Neon branch: ${EXISTING}"
            BRANCH_ID="$EXISTING"
          else
            RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer ${NEON_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"branch\": {\"name\": \"${BRANCH_NAME}\"}, \"endpoints\": [{\"type\": \"read_write\"}]}" \
              "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/branches")
            BRANCH_ID=$(echo "$RESPONSE" | jq -r '.branch.id')
            echo "Created Neon branch: ${BRANCH_ID}"
          fi

          if [ -z "$BRANCH_ID" ] || [ "$BRANCH_ID" = "null" ]; then
            echo "ERROR: Failed to get or create Neon branch (BRANCH_ID=${BRANCH_ID})"
            exit 1
          fi

          # Ensure a read_write compute endpoint exists for the branch (may be missing on reused branches)
          ENDPOINT_ID=$(curl -s \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/endpoints" \
          | jq -r --arg bid "$BRANCH_ID" '.endpoints[] | select(.branch_id == $bid and .type == "read_write") | .id' | head -1)

          if [ -z "$ENDPOINT_ID" ] || [ "$ENDPOINT_ID" = "null" ]; then
            echo "No compute endpoint found for branch ${BRANCH_ID}, creating one..."
            EP_RESPONSE=$(curl -s -X POST \
              -H "Authorization: Bearer ${NEON_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "{\"endpoint\": {\"branch_id\": \"${BRANCH_ID}\", \"type\": \"read_write\"}}" \
              "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/endpoints")
            ENDPOINT_ID=$(echo "$EP_RESPONSE" | jq -r '.endpoint.id')
            if [ -z "$ENDPOINT_ID" ] || [ "$ENDPOINT_ID" = "null" ]; then
              echo "ERROR: Failed to create endpoint (response: ${EP_RESPONSE})"
              exit 1
            fi
            echo "Created endpoint: ${ENDPOINT_ID}"
          else
            echo "Found existing endpoint: ${ENDPOINT_ID}"
          fi

          CONN=$(curl -s \
            -H "Authorization: Bearer ${NEON_API_KEY}" \
            "https://console.neon.tech/api/v2/projects/${NEON_PROJECT_ID}/connection_uri?branch_id=${BRANCH_ID}&database_name=neondb&role_name=neondb_owner")
          DB_URL=$(echo "$CONN" | jq -r '.uri')

          if [ -z "$DB_URL" ] || [ "$DB_URL" = "null" ]; then
            echo "ERROR: Failed to get Neon connection URI (response: ${CONN})"
            exit 1
          fi

          # asyncpg requires postgresql+asyncpg:// scheme
          ASYNCPG_URL="${DB_URL/postgresql:\/\//postgresql+asyncpg:\/\/}"

          echo "database-url=${ASYNCPG_URL}" >> "$GITHUB_OUTPUT"

      - name: Set Fly secrets
        env:
          FLY_API_TOKEN: ${{ secrets.PREVIEW_FLY_API_TOKEN }}
        run: |
          flyctl secrets set \
            SECRET_KEY="${{ secrets.PREVIEW_SECRET_KEY }}" \
            ENCRYPTION_KEY="${{ secrets.PREVIEW_ENCRYPTION_KEY }}" \
            DATABASE_URL="${{ steps.neon.outputs.database-url }}" \
            REDIS_URL="${{ secrets.PREVIEW_UPSTASH_REDIS_URL }}" \
            BACKEND_PUBLIC_URL="${{ steps.urls.outputs.backend-url }}" \
            FRONTEND_URL="https://pr-${{ steps.pr.outputs.number }}--${{ vars.NETLIFY_SITE_NAME }}.netlify.app" \
            OPA_URL="http://localhost:8181" \
            APP_ENV="preview" \
            --app autoaudit-pr-${{ steps.pr.outputs.number }}

      - name: Deploy backend to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.PREVIEW_FLY_API_TOKEN }}
        run: |
          IMAGE="${{ secrets.PREVIEW_DOCKER_HUB_USERNAME }}/autoaudit-backend:pr-${{ steps.pr.outputs.number }}"
          flyctl deploy \
            --app autoaudit-pr-${{ steps.pr.outputs.number }} \
            --config fly.preview.toml \
            --image "$IMAGE" \
            --strategy immediate \
            --wait-timeout 120

  # ─────────────────────────────────────────────────────────────────────────────
  # Job 4 — Post / update PR comment with preview URL
  # ─────────────────────────────────────────────────────────────────────────────
  post-preview-comment:
    runs-on: ubuntu-latest
    needs: [build-frontend, deploy-backend-preview]
    if: always() && needs.build-frontend.result == 'success'

    steps:
      - name: Find existing preview comment
        id: find-comment
        uses: peter-evans/find-comment@v3
        with:
          issue-number: ${{ needs.build-frontend.outputs.pr-number }}
          comment-author: github-actions[bot]
          body-includes: "<!-- autoaudit-preview -->"

      - name: Create or update preview comment
        uses: peter-evans/create-or-update-comment@v4
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ needs.build-frontend.outputs.pr-number }}
          edit-mode: replace
          body: |
            <!-- autoaudit-preview -->
            ## Preview Environment

            | | URL |
            |---|---|
            | Frontend | ${{ needs.build-frontend.outputs.netlify-url }} |

            > Last updated: ${{ github.sha }} · [Workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
